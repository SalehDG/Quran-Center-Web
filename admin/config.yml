backend:
  name: git-gateway
  branch: main # Ubah menjadi 'master' jika branch utamamu bernama master

media_folder: "images"
public_folder: "/images"

collections:
  - name: "menu"
    label: "Menu Navigasi"
    folder: "data/menu"
    create: true
    extension: "json"
    format: "json"
    fields:
      - {label: "Judul Menu", name: "title", widget: "string"}
      - {label: "Link URL", name: "url", widget: "string"}
      - {label: "Ikon (Emoji)", name: "icon", widget: "string", required: false}